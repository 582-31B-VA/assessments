{{define "thread"}}
<a href="/thread/view/{{.ID}}">
    <article>
        <dl>
            <dt>Title</dt>
            <dd>{{.Title}}</dd>
            <dt>Date</dt>
            <dd>{{.Created}}</dd>
            <dt>Author</dt>
            <dd>{{.Author.Username}}</dd>
            {{with .Posts}} 
                {{with index . 0}}
                    <dt>Latest post</dt>
                    <dd>
                        <p>Author: {{.Author.Username}}</p>
                        <p>
                            {{if gt (len .Body) 100}} 
                                {{slice .Body 0 100}} 
                            {{else}}
                                {{.Body}} 
                            {{end}}
                        </p>
                    </dd>
                {{end}} 
            {{end}}
        </dl>
    </article>
</a>
{{end}}
